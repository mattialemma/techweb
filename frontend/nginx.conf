# File: nginx.conf
# Scopo: Serve la SPA React compilata dall'immagine frontend di produzione.
# Livello: Configurazione server web

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }
}
